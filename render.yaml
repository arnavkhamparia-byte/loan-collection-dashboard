services:
  - type: web
    name: loan-collection-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false        # Set this manually in Render dashboard (keep creds out of repo)
      - key: CACHE_SECONDS
        value: 300
    healthCheckPath: /api/health
    autoDeploy: true
